<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-MASKER | 이명 정밀 케어</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;700&display=swap');
  :root{--bg:#0a0c0f;--panel:#111318;--border:#1e2530;--accent:#00d4aa;--accent2:#ff6b35;--warn:#ffb800;--text:#c8d8e8;--dim:#4a5568;--mono:'Share Tech Mono',monospace;--sans:'Noto Sans KR',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,170,0.015) 2px,rgba(0,212,170,0.015) 4px);pointer-events:none;z-index:999;}
  .container{max-width:480px;margin:0 auto;padding:16px;}
  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .logo{font-family:var(--mono);font-size:22px;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px rgba(0,212,170,0.5);}
  .logo span{color:var(--accent2);}
  .status-pill{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:2px;border:1px solid var(--dim);color:var(--dim);letter-spacing:2px;transition:all 0.3s;}
  .status-pill.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 10px rgba(0,212,170,0.3);}
  .engine-wrap{display:flex;flex-direction:column;align-items:center;margin:24px 0;}
  .engine-ring{position:relative;width:200px;height:200px;cursor:pointer;}
  .ring-svg{width:100%;height:100%;}
  .engine-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .engine-btn{width:80px;height:80px;border-radius:50%;background:var(--panel);border:2px solid var(--border);color:var(--dim);font-family:var(--mono);font-size:11px;letter-spacing:2px;cursor:pointer;transition:all 0.3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .engine-btn .btn-icon{font-size:24px;line-height:1;}
  .engine-btn.running{border-color:var(--accent);color:var(--accent);box-shadow:0 0 20px rgba(0,212,170,0.3),inset 0 0 20px rgba(0,212,170,0.05);}
  .engine-btn.running .btn-icon{animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .rpm-display{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:1px;margin-top:8px;transition:color 0.3s;}
  .rpm-display.active{color:var(--accent);}
  .tabs{display:flex;gap:1px;margin-bottom:16px;background:var(--border);border-radius:4px;padding:1px;}
  .tab{flex:1;padding:8px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:3px;color:var(--dim);transition:all 0.2s;}
  .tab.active{background:var(--panel);color:var(--accent);}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px;}
  .panel-title{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--dim);margin-bottom:14px;}
  .slider-row{margin-bottom:16px;}
  .slider-label{display:flex;justify-content:space-between;margin-bottom:6px;}
  .slider-name{font-size:12px;color:var(--text);}
  .slider-val{font-family:var(--mono);font-size:12px;color:var(--accent);}
  input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 8px rgba(0,212,170,0.5);}
  input[type=range].orange::-webkit-slider-thumb{background:var(--accent2);box-shadow:0 0 8px rgba(255,107,53,0.5);}
  input[type=range].yellow::-webkit-slider-thumb{background:var(--warn);box-shadow:0 0 8px rgba(255,184,0,0.5);}
  .freq-display{display:flex;align-items:center;justify-content:center;padding:10px;background:var(--bg);border-radius:4px;margin-bottom:14px;border:1px solid var(--border);font-family:var(--mono);}
  .freq-num{font-size:32px;color:var(--accent);text-shadow:0 0 10px rgba(0,212,170,0.4);}
  .freq-unit{font-size:14px;color:var(--dim);margin-left:6px;align-self:flex-end;padding-bottom:4px;}
  canvas{width:100%;height:60px;display:block;border:1px solid var(--border);border-radius:4px;background:var(--bg);margin-bottom:12px;}
  .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .preset-btn{padding:10px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;cursor:pointer;text-align:center;transition:all 0.2s;font-size:11px;color:var(--dim);}
  .preset-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(0,212,170,0.05);}
  .preset-btn .p-icon{font-size:18px;display:block;margin-bottom:4px;}
  .checkin-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--accent2);color:var(--accent2);border-radius:4px;font-family:var(--mono);font-size:12px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
  .log-list{list-style:none;margin-top:12px;}
  .log-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;}
  .log-time{color:var(--dim);}
  .log-level{color:var(--accent);}
  .log-note{color:var(--text);font-size:10px;}
  .mml-bar{height:8px;background:var(--border);border-radius:4px;margin:8px 0;overflow:hidden;}
  .mml-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--warn));transition:width 0.5s;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">V<span>-</span>MASKER</div>
    <div class="status-pill" id="statusPill">STANDBY</div>
  </div>
  <div class="engine-wrap">
    <div class="engine-ring" onclick="toggleEngine()">
      <svg class="ring-svg" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="92" fill="none" stroke="#1e2530" stroke-width="2"/>
        <circle cx="100" cy="100" r="92" fill="none" stroke="#00d4aa" stroke-width="2"
          stroke-dasharray="578" stroke-dashoffset="578" id="progressArc"
          stroke-linecap="round" transform="rotate(-90 100 100)"
          style="transition:stroke-dashoffset 0.5s;filter:drop-shadow(0 0 6px #00d4aa)"/>
        <g id="fanGroup" style="transform-origin:100px 100px">
          <path d="M100,100 Q110,72 100,60 Q88,72 100,100" fill="#1e2530" opacity="0.8"/>
          <path d="M100,100 Q128,108 140,100 Q128,88 100,100" fill="#1e2530" opacity="0.8"/>
          <path d="M100,100 Q90,128 100,140 Q112,128 100,100" fill="#1e2530" opacity="0.8"/>
          <path d="M100,100 Q72,92 60,100 Q72,112 100,100" fill="#1e2530" opacity="0.8"/>
        </g>
        <circle cx="100" cy="100" r="48" fill="#111318" stroke="#1e2530" stroke-width="1"/>
        <g stroke="#1e2530" stroke-width="1">
          <line x1="100" y1="10" x2="100" y2="18" transform="rotate(0 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="15" transform="rotate(30 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="15" transform="rotate(60 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="18" transform="rotate(90 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="15" transform="rotate(120 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="15" transform="rotate(150 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="18" transform="rotate(180 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="15" transform="rotate(210 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="15" transform="rotate(240 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="18" transform="rotate(270 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="15" transform="rotate(300 100 100)"/>
          <line x1="100" y1="10" x2="100" y2="15" transform="rotate(330 100 100)"/>
        </g>
      </svg>
      <div class="engine-center">
        <button class="engine-btn" id="engineBtn">
          <span class="btn-icon">⬡</span>
          <span id="btnLabel">START</span>
        </button>
      </div>
    </div>
    <div class="rpm-display" id="rpmDisplay">RPM: ---</div>
  </div>
  <canvas id="vizCanvas"></canvas>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('sound',this)">SOUND</div>
    <div class="tab" onclick="switchTab('fingerprint',this)">이명지문</div>
    <div class="tab" onclick="switchTab('presets',this)">프리셋</div>
    <div class="tab" onclick="switchTab('log',this)">LOG</div>
  </div>
  <div id="tab-sound">
    <div class="panel">
      <div class="panel-title">// V-ENGINE PARAMETERS</div>
      <div class="slider-row"><div class="slider-label"><span class="slider-name">마스킹 볼륨</span><span class="slider-val" id="volVal">65</span></div><input type="range" min="0" max="100" value="65" id="volSlider" oninput="updateVol(this.value)"></div>
      <div class="slider-row"><div class="slider-label"><span class="slider-name">노후도 (Roughness)</span><span class="slider-val" id="roughVal">40</span></div><input type="range" class="orange" min="0" max="100" value="40" id="roughSlider" oninput="updateRough(this.value)"></div>
      <div class="slider-row"><div class="slider-label"><span class="slider-name">먹먹함 (Low-pass)</span><span class="slider-val" id="lpVal">600 Hz</span></div><input type="range" class="orange" min="100" max="4000" value="600" id="lpSlider" oninput="updateLP(this.value)"></div>
      <div class="slider-row"><div class="slider-label"><span class="slider-name">진동 깊이 (LFO Depth)</span><span class="slider-val" id="lfoDepthVal">30</span></div><input type="range" class="yellow" min="0" max="100" value="30" id="lfoDepthSlider" oninput="updateLFODepth(this.value)"></div>
      <div class="slider-row"><div class="slider-label"><span class="slider-name">진동 속도 (LFO Rate)</span><span class="slider-val" id="lfoRateVal">1.2 Hz</span></div><input type="range" class="yellow" min="1" max="60" value="12" id="lfoRateSlider" oninput="updateLFORate(this.value)"></div>
    </div>
  </div>
  <div id="tab-fingerprint" class="hidden">
    <div class="panel">
      <div class="panel-title">// 이명 주파수 매칭</div>
      <div class="freq-display"><span class="freq-num" id="freqNum">4000</span><span class="freq-unit">Hz</span></div>
      <div class="slider-row"><div class="slider-label"><span class="slider-name">주파수 조절</span><span class="slider-val" id="freqVal">4000 Hz</span></div><input type="range" min="500" max="14000" value="4000" id="freqSlider" oninput="updateFreq(this.value)"></div>
      <div style="text-align:center;margin:8px 0 14px;"><button onclick="toggleTone()" id="toneBtn" style="padding:8px 20px;background:transparent;border:1px solid #00d4aa;color:#00d4aa;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:2px;cursor:pointer;">▶ 이명음 재생</button></div>
      <div class="panel-title" style="margin-top:8px;">// MML 측정 (최소 차폐 레벨)</div>
      <div class="slider-row"><div class="slider-label"><span class="slider-name">차폐 시작 지점</span><span class="slider-val" id="mmlVal">65</span></div><input type="range" min="0" max="100" value="65" id="mmlSlider" oninput="updateMML(this.value)"></div>
      <div class="mml-bar"><div class="mml-fill" id="mmlFill" style="width:65%"></div></div>
      <button class="checkin-btn" style="margin-top:8px;" onclick="saveMML()">MML 저장하기</button>
    </div>
  </div>
  <div id="tab-presets" class="hidden">
    <div class="panel">
      <div class="panel-title">// 환경 프리셋</div>
      <div class="preset-grid">
        <div class="preset-btn sel" onclick="applyPreset('home',this)"><span class="p-icon">🏠</span>우리 집 화장실</div>
        <div class="preset-btn" onclick="applyPreset('range',this)"><span class="p-icon">🎯</span>교관실 환풍기</div>
        <div class="preset-btn" onclick="applyPreset('rain',this)"><span class="p-icon">🌧️</span>비 오는 날</div>
        <div class="preset-btn" onclick="applyPreset('sleep',this)"><span class="p-icon">😴</span>수면 모드</div>
        <div class="preset-btn" onclick="applyPreset('office',this)"><span class="p-icon">🏢</span>사무실 에어컨</div>
        <div class="preset-btn" onclick="applyPreset('field',this)"><span class="p-icon">🚨</span>현장 집중 모드</div>
      </div>
    </div>
  </div>
  <div id="tab-log" class="hidden">
    <div class="panel">
      <div class="panel-title">// 오늘의 체크인</div>
      <button class="checkin-btn" onclick="doCheckin()">📊 현재 MML 체크인 기록</button>
      <ul class="log-list" id="logList"></ul>
    </div>
  </div>
</div>
<script>
let ctx=null,bufferNode=null,gainNode=null,filterNode=null,lfoNode=null,lfoGain=null,toneOsc=null,analyser=null,running=false,fanAngle=0,fanAnim=null;
const PRESETS={home:{vol:65,rough:40,lp:600,lfoD:30,lfoR:12},range:{vol:80,rough:85,lp:1800,lfoD:60,lfoR:28},rain:{vol:55,rough:20,lp:400,lfoD:15,lfoR:6},sleep:{vol:45,rough:10,lp:300,lfoD:8,lfoR:4},office:{vol:50,rough:25,lp:800,lfoD:20,lfoR:10},field:{vol:75,rough:65,lp:1200,lfoD:45,lfoR:20}};
function buildNoise(a){const l=a.sampleRate*4,b=a.createBuffer(1,l,a.sampleRate),d=b.getChannelData(0);let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<l;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)/7;b6=w*0.115926;}return b;}
function getVol(){return parseFloat(document.getElementById('volSlider').value)/100*0.8;}
function getLPFreq(){return parseFloat(document.getElementById('lpSlider').value);}
function getLFORate(){return parseFloat(document.getElementById('lfoRateSlider').value)/10;}
function getLFODepth(){const r=parseFloat(document.getElementById('roughSlider').value)/100,d=parseFloat(document.getElementById('lfoDepthSlider').value)/100;return getVol()*d*(0.2+r*0.6);}
function startEngine(){if(running)return;ctx=new(window.AudioContext||window.webkitAudioContext)();analyser=ctx.createAnalyser();analyser.fftSize=256;bufferNode=ctx.createBufferSource();bufferNode.buffer=buildNoise(ctx);bufferNode.loop=true;gainNode=ctx.createGain();gainNode.gain.value=getVol();filterNode=ctx.createBiquadFilter();filterNode.type='lowpass';filterNode.frequency.value=getLPFreq();lfoNode=ctx.createOscillator();lfoNode.type='sine';lfoNode.frequency.value=getLFORate();lfoGain=ctx.createGain();lfoGain.gain.value=getLFODepth();lfoNode.connect(lfoGain);lfoGain.connect(gainNode.gain);bufferNode.connect(filterNode);filterNode.connect(gainNode);gainNode.connect(analyser);analyser.connect(ctx.destination);bufferNode.start();lfoNode.start();running=true;}
function stopEngine(){if(!running)return;try{bufferNode.stop();lfoNode.stop();if(toneOsc)toneOsc.stop();}catch(e){}ctx.close();ctx=null;toneOsc=null;running=false;}
function updateVol(v){document.getElementById('volVal').textContent=v;if(running&&gainNode)gainNode.gain.setTargetAtTime(v/100*0.8,ctx.currentTime,0.1);updateRPM();}
function updateRough(v){document.getElementById('roughVal').textContent=v;if(running&&lfoGain)lfoGain.gain.setTargetAtTime(getLFODepth(),ctx.currentTime,0.1);}
function updateLP(v){document.getElementById('lpVal').textContent=v+' Hz';if(running&&filterNode)filterNode.frequency.setTargetAtTime(v,ctx.currentTime,0.1);}
function updateLFODepth(v){document.getElementById('lfoDepthVal').textContent=v;if(running&&lfoGain)lfoGain.gain.setTargetAtTime(getLFODepth(),ctx.currentTime,0.1);}
function updateLFORate(v){document.getElementById('lfoRateVal').textContent=(v/10).toFixed(1)+' Hz';if(running&&lfoNode)lfoNode.frequency.setTargetAtTime(v/10,ctx.currentTime,0.1);}
function updateFreq(v){document.getElementById('freqVal').textContent=v+' Hz';document.getElementById('freqNum').textContent=v;}
function updateMML(v){document.getElementById('mmlVal').textContent=v;document.getElementById('mmlFill').style.width=v+'%';}
function updateRPM(){const v=parseFloat(document.getElementById('volSlider').value);document.getElementById('rpmDisplay').textContent=running?'RPM: '+Math.round(v*28+200):'RPM: ---';document.getElementById('progressArc').style.strokeDashoffset=running?578*(1-v/100):578;}
function toggleEngine(){if(!running){startEngine();updateRPM();document.getElementById('engineBtn').classList.add('running');document.getElementById('btnLabel').textContent='STOP';document.getElementById('statusPill').textContent='RUNNING';document.getElementById('statusPill').classList.add('active');document.getElementById('rpmDisplay').classList.add('active');startFan();startViz();}else{stopEngine();updateRPM();document.getElementById('engineBtn').classList.remove('running');document.getElementById('btnLabel').textContent='START';document.getElementById('statusPill').textContent='STANDBY';document.getElementById('statusPill').classList.remove('active');document.getElementById('rpmDisplay').classList.remove('active');stopFan();clearViz();}}
function startFan(){if(fanAnim)return;(function s(){fanAngle=(fanAngle+parseFloat(document.getElementById('volSlider').value)/100*6+1)%360;const f=document.getElementById('fanGroup');f.style.transform='rotate('+fanAngle+'deg)';f.style.transformOrigin='100px 100px';fanAnim=requestAnimationFrame(s);})();}
function stopFan(){if(fanAnim){cancelAnimationFrame(fanAnim);fanAnim=null;}document.getElementById('fanGroup').style.transform='rotate(0deg)';}
const canvas=document.getElementById('vizCanvas');const dpr=window.devicePixelRatio||1;canvas.width=canvas.offsetWidth*dpr;canvas.height=60*dpr;const ctx2d=canvas.getContext('2d');let vizAnim=null;
function startViz(){if(vizAnim)return;(function d(){if(!analyser)return;const W=canvas.width,H=canvas.height,arr=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(arr);ctx2d.fillStyle='#0a0c0f';ctx2d.fillRect(0,0,W,H);const bw=W/arr.length;for(let i=0;i<arr.length;i++){const h=arr[i]/255*H,g=ctx2d.createLinearGradient(0,H-h,0,H);g.addColorStop(0,'rgba(0,212,170,0.8)');g.addColorStop(1,'rgba(0,212,170,0.1)');ctx2d.fillStyle=g;ctx2d.fillRect(i*bw,H-h,bw-1,h);}vizAnim=requestAnimationFrame(d);})();}
function clearViz(){if(vizAnim){cancelAnimationFrame(vizAnim);vizAnim=null;}ctx2d.fillStyle='#0a0c0f';ctx2d.fillRect(0,0,canvas.width,canvas.height);ctx2d.strokeStyle='#1e2530';ctx2d.lineWidth=1;ctx2d.beginPath();ctx2d.moveTo(0,canvas.height/2);ctx2d.lineTo(canvas.width,canvas.height/2);ctx2d.stroke();}
clearViz();
let toneRunning=false;
function toggleTone(){const btn=document.getElementById('toneBtn');if(!toneRunning){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();toneOsc=ctx.createOscillator();const tg=ctx.createGain();toneOsc.type='sine';toneOsc.frequency.value=parseFloat(document.getElementById('freqSlider').value);tg.gain.value=0.15;toneOsc.connect(tg);tg.connect(ctx.destination);toneOsc.start();toneRunning=true;btn.textContent='■ 이명음 정지';btn.style.borderColor='var(--accent2)';btn.style.color='var(--accent2)';}else{try{toneOsc.stop();}catch(e){}toneRunning=false;toneOsc=null;btn.textContent='▶ 이명음 재생';btn.style.borderColor='var(--accent)';btn.style.color='var(--accent)';}}
document.getElementById('freqSlider').addEventListener('input',function(){if(toneRunning&&toneOsc)toneOsc.frequency.value=parseFloat(this.value);});
function applyPreset(name,el){document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');const p=PRESETS[name];document.getElementById('volSlider').value=p.vol;updateVol(p.vol);document.getElementById('roughSlider').value=p.rough;updateRough(p.rough);document.getElementById('lpSlider').value=p.lp;updateLP(p.lp);document.getElementById('lfoDepthSlider').value=p.lfoD;updateLFODepth(p.lfoD);document.getElementById('lfoRateSlider').value=p.lfoR;updateLFORate(p.lfoR);}
const logs=[];
function doCheckin(){const mml=document.getElementById('mmlSlider').value,now=new Date(),t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'),d=(now.getMonth()+1)+'/'+(now.getDate());logs.unshift({time:d+' '+t,mml,note:'MML '+mml});renderLogs();}
function saveMML(){alert('MML '+document.getElementById('mmlSlider').value+' 저장 완료\nPhase 2에서 Supabase DB 연동 예정');}
function renderLogs(){document.getElementById('logList').innerHTML=logs.slice(0,8).map(l=>`<li class="log-item"><span class="log-time">${l.time}</span><span class="log-note">${l.note}</span><span class="log-level">Lv.${l.mml}</span></li>`).join('');}
function switchTab(name,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');['sound','fingerprint','presets','log'].forEach(t=>{const e=document.getElementById('tab-'+t);if(e)e.classList.toggle('hidden',t!==name);});}
